<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arena 人机对战</title>
<style>
  :root {
    --cl-human: #2563eb; --cl-human-bg: #1e293b;
    --cl-ai: #dc2626; --cl-ai-bg: #2d1e1e;
    --cl-gold: #f59e0b; --cl-green: #22c55e; --cl-gray: #64748b;
    --cl-purple: #a78bfa;
    --bg: #0f172a; --panel: #1e293b; --text: #e2e8f0; --dim: #94a3b8;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    display: grid; grid-template-rows: 48px 1fr 100px;
    height: 100vh; overflow: hidden;
  }

  /* 顶栏 */
  #topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 20px; background: #1e293b; border-bottom: 1px solid #334155;
    gap: 12px;
  }
  #topbar h1 { font-size: 18px; letter-spacing: .5px; white-space: nowrap; }
  #phase-label {
    background: #334155; padding: 4px 14px; border-radius: 12px; font-size: 13px;
    white-space: nowrap;
  }
  #day-label { font-size: 13px; color: var(--dim); white-space: nowrap; }
  .btn-rules {
    background: #334155; color: var(--text); border: 1px solid #475569;
    padding: 6px 14px; border-radius: 8px; font-size: 12px; cursor: pointer;
  }
  .btn-rules:hover { background: #475569; }
  #btn-start {
    background: var(--cl-green); color: #000; border: none;
    padding: 8px 22px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600;
  }
  #btn-start:hover { opacity: .85; }
  #btn-start:disabled { opacity: .4; cursor: not-allowed; }

  /* 规则折叠面板 */
  #rules-collapse {
    display: none;
    position: absolute; top: 48px; left: 0; right: 0; z-index: 100;
    background: #1e293b; border-bottom: 2px solid #475569;
    padding: 16px 24px; max-height: 280px; overflow-y: auto;
    font-size: 12px; line-height: 1.7;
  }
  #rules-collapse.show { display: block; }

  /* 主区域: 3 列 */
  #main {
    display: grid; grid-template-columns: 2fr 420px 0.6fr; gap: 8px; padding: 8px;
    min-height: 0;
  }

  /* 玩家面板 */
  .player-panel {
    display: flex; flex-direction: column; gap: 6px; min-height: 0;
    border-radius: 10px; padding: 10px; overflow: hidden;
  }
  .player-panel.human { background: var(--cl-human-bg); border: 1px solid var(--cl-human); }
  .player-panel.ai { background: var(--cl-ai-bg); border: 1px solid var(--cl-ai); }

  .panel-title {
    font-size: 15px; font-weight: 700; padding: 4px 10px; border-radius: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .panel-title.human { background: var(--cl-human); color: #fff; }
  .panel-title.ai { background: var(--cl-ai); color: #fff; }
  .player-avatar {
    width: 40px; height: 40px; border-radius: 50%; object-fit: cover;
    border: 2px solid rgba(255,255,255,0.3); flex-shrink: 0;
    background: #334155;
  }

  /* 信息卡片 */
  .info-header {
    font-size: 11px; color: var(--dim); margin-bottom: 2px;
    display: flex; align-items: center; gap: 4px;
  }
  .info-cards { display: flex; flex-direction: column; gap: 4px; max-height: 280px; overflow-y: auto; }
  .info-card {
    background: #0f172a80; border-radius: 6px; padding: 6px 10px;
    font-size: 12px; display: flex; justify-content: space-between;
  }
  .info-card .rate { color: var(--cl-gold); font-weight: 700; white-space: nowrap; }
  .info-card .card-avatar {
    width: 28px; height: 28px; border-radius: 50%; object-fit: cover;
    border: 1px solid #475569; margin-right: 6px; flex-shrink: 0;
  }
  .info-card .card-left { display: flex; align-items: center; overflow: hidden; }
  .info-card .card-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* 聊天日志 */
  .chat-log {
    flex: 1; min-height: 0; overflow-y: auto; font-size: 11px; line-height: 1.5;
    background: #0f172a40; border-radius: 6px; padding: 6px;
  }
  .chat-log .msg { margin-bottom: 6px; padding: 4px 6px; border-radius: 4px; }
  .chat-log .msg.system { background: #33415540; color: #94a3b8; }
  .chat-log .msg.info { background: #1e3a5f40; }
  .chat-log .msg .label { font-size: 10px; color: var(--dim); display: block; }

  /* 中央面板 */
  #center {
    display: flex; flex-direction: column; gap: 8px; min-height: 0;
    background: var(--panel); border-radius: 10px; padding: 12px;
    border: 1px solid #334155; text-align: center; overflow: hidden;
  }
  #center h3 { font-size: 14px; color: var(--dim); margin-bottom: 4px; }

  /* AI 状态指示器 */
  #ai-status {
    display: none;
    background: #1e3a5f; border: 1px solid var(--cl-gold); border-radius: 8px;
    padding: 8px 14px; margin: 4px 0; font-size: 13px; color: var(--cl-gold);
    animation: pulse 2s ease-in-out infinite;
  }
  #ai-status.show { display: block; }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.6; }
  }

  /* 拍卖卡片 */
  #auction-card {
    background: #0f172a; border: 2px solid var(--cl-gold); border-radius: 12px;
    padding: 20px; margin: 8px 0; display: none;
  }
  #auction-card .name { font-size: 24px; font-weight: 800; color: var(--cl-gold); }
  #auction-card .id { font-size: 13px; color: var(--dim); margin: 4px 0; }
  #auction-card .auction-avatar {
    width: 160px; height: 160px; border-radius: 12px; object-fit: cover;
    border: 2px solid var(--cl-gold); margin: 8px 0;
  }

  /* 比赛显示 */
  #match-display {
    background: #0f172a; border-radius: 8px; padding: 12px; margin: 4px 0;
    display: none;
  }
  #match-display .vs { font-size: 20px; font-weight: 800; margin: 6px 0; }
  #match-display .winner { color: var(--cl-gold); }

  /* 输入表单区 */
  #input-area {
    background: #0f172a; border: 1px solid var(--cl-gold); border-radius: 8px;
    padding: 14px; display: none; text-align: left;
  }
  #input-area h4 { color: var(--cl-gold); margin-bottom: 8px; font-size: 14px; text-align: center; }
  #input-area input, #input-area select, #input-area textarea {
    width: 100%; background: #1e293b; color: var(--text); border: 1px solid #475569;
    border-radius: 6px; padding: 8px 10px; font-size: 14px; margin-bottom: 8px;
  }
  #input-area textarea { min-height: 80px; resize: vertical; font-size: 12px; }
  #input-area button {
    width: 100%; background: var(--cl-green); color: #000; border: none;
    padding: 10px; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: 600;
  }
  #input-area button:hover { opacity: .85; }
  #input-area .hint { font-size: 11px; color: var(--dim); margin-bottom: 6px; }
  #input-area .deploy-option {
    display: flex; align-items: center; gap: 8px; padding: 6px 0;
    border-bottom: 1px solid #1e293b; font-size: 13px;
  }
  #input-area .deploy-option input { width: auto; margin: 0; }
  #input-area .deploy-slot-label {
    color: var(--cl-gold); font-weight: 700; font-size: 12px; margin-top: 8px;
  }

  /* 结果区 */
  #result-area { flex: 1; min-height: 0; overflow-y: auto; font-size: 12px; }
  .day-sep {
    text-align: center; color: var(--cl-gold); font-weight: 700;
    font-size: 13px; padding: 6px 0; margin: 4px 0;
    border-bottom: 1px dashed #334155;
  }

  /* 底部状态栏 */
  #statusbar {
    display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid #334155;
    background: #1e293b; padding: 6px 20px; font-size: 12px; gap: 12px;
  }
  .status-col { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  .status-col.right { justify-content: flex-end; text-align: right; }
  .stat { display: flex; flex-direction: column; }
  .stat .val { font-size: 18px; font-weight: 700; }
  .stat .lbl { font-size: 10px; color: var(--dim); }
  .stat.human .val { color: var(--cl-human); }
  .stat.ai .val { color: var(--cl-ai); }
  .stat.pool .val { color: var(--cl-gold); }
  .stat.reward .val { color: var(--cl-purple); }

  /* 拍卖结果 */
  .bid-result {
    padding: 8px; border-radius: 6px; margin: 4px 0; font-size: 13px;
  }
  .bid-result.win-human { background: #1e3a5f; border: 1px solid var(--cl-human); }
  .bid-result.win-ai { background: #4a1e1e; border: 1px solid var(--cl-ai); }
  .bid-result.win-tie { background: #334155; border: 1px solid #64748b; color: #94a3b8; }
  .auto-fill-msg {
    padding: 8px 12px; border-radius: 6px; margin: 4px 0; font-size: 13px;
    background: #1a2a1a; border: 1px solid #166534; color: #4ade80;
  }

  /* 赛前教程遮罩 */
  #rules-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(15, 23, 42, 0.97); z-index: 200;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 2rem;
  }
  .tutorial-container {
    width: 100%; max-width: 680px; max-height: 88vh;
    display: flex; flex-direction: column;
    background: #1e293b; border: 1px solid #475569; border-radius: 16px;
    overflow: hidden;
  }
  /* 进度条 */
  .tutorial-progress {
    display: flex; align-items: center; justify-content: center;
    padding: 18px 24px 8px; gap: 0;
  }
  .step-dot {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700;
    background: #334155; color: #64748b;
    border: 2px solid #475569;
    transition: all 0.3s ease;
    flex-shrink: 0;
  }
  .step-dot.done {
    background: #166534; color: #4ade80; border-color: #22c55e;
  }
  .step-dot.active {
    background: #1e3a5f; color: var(--cl-gold);
    border-color: var(--cl-gold);
    box-shadow: 0 0 10px rgba(245,158,11,0.4);
  }
  .step-line {
    width: 36px; height: 2px; background: #475569;
    flex-shrink: 0;
  }
  .step-line.done { background: #22c55e; }
  /* 内容区 */
  .tutorial-content {
    flex: 1; overflow-y: auto; padding: 12px 28px 8px;
    text-align: left; font-size: 13px; line-height: 1.9;
  }
  .tutorial-content h2 {
    color: var(--cl-gold); font-size: 20px; text-align: center; margin-bottom: 4px;
  }
  .tutorial-content .subtitle {
    text-align: center; color: var(--dim); font-size: 12px; margin-bottom: 16px;
  }
  .tutorial-content h3 { color: #e2e8f0; font-size: 14px; margin-top: 14px; margin-bottom: 6px; }
  .tutorial-content p { margin-bottom: 8px; color: #cbd5e1; }
  .tutorial-content ul { padding-left: 18px; margin-bottom: 10px; }
  .tutorial-content li { color: #cbd5e1; margin-bottom: 4px; }
  .tutorial-content b { color: #e2e8f0; }
  .tutorial-content .highlight { color: var(--cl-gold); font-weight: 700; }
  .tutorial-content .warn {
    background: #4a1e1e80; border-left: 3px solid #dc2626;
    padding: 8px 12px; border-radius: 0 6px 6px 0; margin: 10px 0;
    font-size: 12px; color: #fca5a5;
  }
  .tutorial-content .tip {
    background: #1e3a5f80; border-left: 3px solid var(--cl-human);
    padding: 8px 12px; border-radius: 0 6px 6px 0; margin: 10px 0;
    font-size: 12px; color: #93c5fd;
  }
  /* 角斗士头像网格 */
  .avatar-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px 8px;
    margin: 14px 0; text-align: center;
  }
  .avatar-grid .av-item { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .avatar-grid .av-item img {
    width: 72px; height: 72px; border-radius: 50%; object-fit: cover;
    border: 2px solid #475569; background: #0f172a;
  }
  .avatar-grid .av-item span { font-size: 11px; color: #94a3b8; }
  /* 教程图片 */
  .tutorial-image {
    text-align: center; margin: 12px 0;
  }
  .tutorial-image img {
    max-width: 100%; border-radius: 8px; border: 1px solid #475569;
  }
  .tutorial-image .img-placeholder {
    display: inline-block; padding: 30px 40px; background: #0f172a80;
    border: 2px dashed #475569; border-radius: 8px;
    color: #64748b; font-size: 12px;
  }
  /* 导航按钮 */
  .tutorial-nav {
    display: flex; align-items: center; justify-content: center;
    padding: 14px 28px 18px; gap: 12px; border-top: 1px solid #334155;
  }
  .tutorial-nav button {
    border: none; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: 600;
    transition: opacity 0.2s;
  }
  .tutorial-nav button:hover { opacity: .85; }
  #btn-prev {
    background: #334155; color: var(--text); padding: 10px 20px;
  }
  #btn-skip {
    background: transparent; color: var(--dim); padding: 10px 16px;
    font-size: 12px; font-weight: 400; text-decoration: underline;
  }
  #btn-next {
    background: var(--cl-green); color: #000; padding: 10px 32px;
    font-size: 15px;
  }
  #btn-prev.hidden { visibility: hidden; }

  /* 布局引导覆盖层 —— 半透明蒙版 + 三列高亮指示 */
  #orient-overlay {
    display: none;
    position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 200;
    /* 与 body 相同 grid: topbar 48px / main 1fr / statusbar 100px */
    grid-template-rows: 48px 1fr 100px;
  }
  #orient-overlay.show { display: grid; }
  /* 三列面板 —— 与 #main 完全相同的 grid 参数 */
  .orient-panels {
    grid-row: 2;
    display: grid;
    grid-template-columns: 2fr 420px 0.6fr;
    gap: 8px; padding: 8px;
  }
  .orient-callout {
    border-radius: 10px; padding: 12px 14px;
    font-size: 12px; line-height: 1.7; text-align: left;
    display: flex; flex-direction: column;
    justify-content: center;
    /* 让下层面板透过来 */
    background: rgba(30, 41, 59, 0.35);
    border: 2px dashed var(--cl-gold);
    color: #e2e8f0;
    position: relative;
  }
  .orient-callout:nth-child(1) { border-color: var(--cl-human); }
  .orient-callout:nth-child(2) { border-color: var(--cl-gold); }
  .orient-callout:nth-child(3) { border-color: var(--cl-ai); }
  .orient-callout .num {
    position: absolute; top: -12px; left: 14px;
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; color: #000;
  }
  .orient-callout:nth-child(1) .num { background: var(--cl-human); }
  .orient-callout:nth-child(2) .num { background: var(--cl-gold); }
  .orient-callout:nth-child(3) .num { background: var(--cl-ai); }
  .orient-callout h3 { font-size: 14px; margin: 2px 0 4px; }
  .orient-callout p { color: #cbd5e1; font-size: 11px; margin: 0; }
  /* 已知晓按钮放在底部状态栏位置 */
  .orient-btn-row {
    grid-row: 3;
    display: flex; align-items: center; justify-content: center;
  }
  #orient-dismiss {
    background: var(--cl-green); color: #000; border: none;
    padding: 12px 40px; border-radius: 8px; font-size: 16px;
    cursor: pointer; font-weight: 600; z-index: 201;
    pointer-events: auto;
  }
  #orient-dismiss:hover { opacity: .85; }
  /* 呼吸动画 */
  .orient-callout {
    animation: orient-glow 2s ease-in-out infinite;
  }
  .orient-callout:nth-child(2) { animation-delay: 0.25s; }
  .orient-callout:nth-child(3) { animation-delay: 0.5s; }
  @keyframes orient-glow {
    0%, 100% { box-shadow: 0 0 6px rgba(255,255,255,0.1); }
    50% { box-shadow: 0 0 16px rgba(255,255,255,0.25); }
  }
</style>
</head>
<body>

<!-- 赛前教程遮罩 -->
<div id="rules-overlay">
  <div class="tutorial-container">
    <!-- 进度条 -->
    <div class="tutorial-progress" id="tutorial-progress">
      <span class="step-dot active" id="dot-0">1</span>
      <span class="step-line" id="line-0"></span>
      <span class="step-dot" id="dot-1">2</span>
      <span class="step-line" id="line-1"></span>
      <span class="step-dot" id="dot-2">3</span>
      <span class="step-line" id="line-2"></span>
      <span class="step-dot" id="dot-3">4</span>
      <span class="step-line" id="line-3"></span>
      <span class="step-dot" id="dot-4">5</span>
      <span class="step-line" id="line-4"></span>
      <span class="step-dot" id="dot-5">6</span>
    </div>
    <!-- 内容区（JS 动态填充） -->
    <div class="tutorial-content" id="tutorial-content"></div>
    <!-- 导航 -->
    <div class="tutorial-nav">
      <button id="btn-prev" class="hidden" onclick="prevTutorialStep()">← 上一步</button>
      <button id="btn-skip" onclick="skipTutorial()">跳过教程，直接开始</button>
      <button id="btn-next" onclick="nextTutorialStep()">继续 →</button>
    </div>
  </div>
</div>

<!-- 布局引导覆盖层（半透明，与 body 同 grid，三列对齐 #main） -->
<div id="orient-overlay">
  <div class="orient-panels">
    <div class="orient-callout">
      <span class="num">1</span>
      <h3>📋 你的信息面板</h3>
      <p>情报预览卡片 · 匿名胜率排名 · 角斗士名单<br>下方聊天区记录系统提示和操作历史</p>
    </div>
    <div class="orient-callout">
      <span class="num">2</span>
      <h3>🎯 核心操作区</h3>
      <p>拍卖卡片 · 部署表单 · 对阵展示<br><b>下方结果区保留所有拍卖和对战的系统结果，可用鼠标滚轮查看</b></p>
    </div>
    <div class="orient-callout">
      <span class="num">3</span>
      <h3>🤖 对手公开信息</h3>
      <p>仅显示 AI 已公开的角斗士阵容<br>AI 游戏币/蓄奖池/策略均<b>不可见</b></p>
    </div>
  </div>
  <div class="orient-btn-row">
    <button id="orient-dismiss" onclick="dismissOrientation()">已知晓，开始游戏</button>
  </div>
</div>

<!-- 规则折叠面板（游玩中查阅） -->
<div id="rules-collapse"></div>

<!-- 顶栏 -->
<div id="topbar">
  <h1>⚔ Arena 人机对战</h1>
  <button class="btn-rules" onclick="toggleRules()">📋 规则参考 <span style="font-size:10px;opacity:.6">← 可点击</span></button>
  <button class="btn-rules" onclick="resetGame(false)" style="background:#ef444420;color:#ef4444">🔄 重置游戏</button>
  <a href="/" onclick="resetGame(true); return false" style="font-size:12px;color:var(--dim);text-decoration:none;padding:4px 10px;border:1px solid #475569;border-radius:6px">🏠 返回首页</a>
  <span id="phase-label">等待开始</span>
  <span id="day-label"></span>
  <button id="btn-start" onclick="startGame()" style="display:none">▶ 开始游戏</button>
</div>

<!-- 主区域 -->
<div id="main">
  <!-- 人类面板 -->
  <div class="player-panel human">
    <div class="panel-title human">
      <div class="player-avatar" style="display:flex;align-items:center;justify-content:center;font-size:20px">🧑</div>
      <span>你</span>
    </div>
    <div style="display:flex;gap:4px;margin-bottom:2px" id="human-info-tabs">
      <button class="btn-rules" onclick="toggleHumanTab('ranking')" style="font-size:10px;padding:3px 8px">📊 匿名排名 <span style="font-size:9px;opacity:.6">← 可点击</span></button>
      <button class="btn-rules" onclick="toggleHumanTab('chars')" style="font-size:10px;padding:3px 8px">📋 角斗士表 <span style="font-size:9px;opacity:.6">← 可点击</span></button>
    </div>
    <div id="human-tab-ranking" style="display:none;max-height:250px;overflow-y:auto;font-size:12px;line-height:1.6;background:#0f172a60;border-radius:6px;padding:6px;margin-bottom:2px;white-space:pre-wrap;color:#94a3b8">
      <textarea id="ranking-textarea" style="width:100%;min-height:200px;background:#1e293b;color:#e2e8f0;border:1px solid #475569;border-radius:4px;padding:6px;font-size:12px;line-height:1.6;resize:vertical;font-family:monospace" placeholder="排名数据加载中..."></textarea>
    </div>
    <div id="human-tab-chars" style="display:none;max-height:250px;overflow-y:auto;font-size:12px;line-height:1.6;background:#0f172a60;border-radius:6px;padding:6px;margin-bottom:2px;word-wrap:break-word;color:#94a3b8"></div>
    <div class="info-header">📊 情报预览（累计） <span id="count-human">0</span> 名</div>
    <div class="info-cards" id="cards-human"></div>
    <div class="chat-log" id="chat-human"></div>
  </div>

  <!-- 中央面板 -->
  <div id="center">
    <h3 id="center-title"></h3>
    <div id="ai-status">🤖 AI 正在思考...</div>
    <div id="auction-card">
      <img class="auction-avatar" id="auction-img" src="" alt="" />
      <div class="name" id="auction-name"></div>
      <div class="id" id="auction-id"></div>
    </div>
    <div id="match-display">
      <div style="display:flex;align-items:center;justify-content:center;gap:12px;">
        <div style="text-align:center">
          <img id="match-img-human" src="" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--cl-human)" alt="" />
          <div id="match-char-human" style="font-size:13px;margin-top:4px"></div>
        </div>
        <span style="font-size:20px;font-weight:800">VS</span>
        <div style="text-align:center">
          <img id="match-img-ai" src="" style="width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--cl-ai)" alt="" />
          <div id="match-char-ai" style="font-size:13px;margin-top:4px"></div>
        </div>
      </div>
      <div id="match-result" style="margin-top:8px"></div>
    </div>
    <!-- 输入表单 -->
    <div id="input-area"></div>
    <!-- 结果滚动区 -->
    <div id="result-area"></div>
  </div>

  <!-- AI 面板（精简） -->
  <div class="player-panel ai">
    <div class="panel-title ai">
      <div class="player-avatar" style="display:flex;align-items:center;justify-content:center;font-size:20px">🤖</div>
      <span>AI 对手</span>
    </div>
    <div class="info-header">📋 AI 阵容（仅公开信息）</div>
    <div class="info-cards" id="cards-ai"></div>
    <div class="chat-log" id="chat-ai"></div>
  </div>
</div>

<!-- 底部状态栏 -->
<div id="statusbar">
  <div class="status-col" id="status-human"></div>
  <div class="status-col right" id="status-ai"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// 全局状态
// ═══════════════════════════════════════════════════════════
const humanName = "人类玩家";
const aiName = "智能体";
let gameStarted = false;
let _resultDay = 0;

const evtSource = new EventSource("/events");

evtSource.onopen = function() {
  console.log("SSE 连接已建立");
  if (!gameStarted) {
    setPhase("等待开始 — SSE 已连接");
  }
};

evtSource.onmessage = function(e) {
  const evt = JSON.parse(e.data);
  console.log("SSE event:", evt.type, evt.data);
  handle(evt.type, evt.data);
};

evtSource.onerror = function(e) {
  console.error("SSE 连接错误", e);
  setPhase("SSE 连接断开，正在重连...");
};

// ═══════════════════════════════════════════════════════════
// 事件处理
// ═══════════════════════════════════════════════════════════

function handle(type, d) {
  switch(type) {
    case "game_start":
      setPhase("开局信息展示中");
      setDay("");
      clearAll();
      appendChatHuman("📋 系统", "开局信息已展示。双方初始各 800 游戏币。");
      break;

    case "progress":
      setPhase(d.msg);
      // 显示 AI 状态指示器
      if (d.msg && d.msg.includes("AI")) {
        document.getElementById("ai-status").textContent = "🤖 " + d.msg;
        document.getElementById("ai-status").classList.add("show");
      }
      break;

    case "rules_done":
      setPhase("情报阶段");
      break;

    case "preview":
      setPhase("情报预览");
      setDay(d.day);
      setCardsHuman(d.gladiators);
      hideMatch();  // 6. 新一天开始时隐藏旧 match-display
      if (d.day !== _resultDay) {
        _resultDay = d.day;
        appendResult(`<div class="day-sep">── 第 ${d.day} 天 ──</div>`);
      }
      break;

    case "auction_show":
      setPhase("拍卖中");
      setDay(d.day);
      showAuction(d.char_name, d.char_id);
      hideMatch();
      // 不主动 hideInputArea——awaiting_bid/showBidForm 会覆盖内容。
      // 如果 AI 处理慢，人类至少能看到上一个阶段的表单而非空白。
      break;

    case "auction_bid":
      // 公开：显示双方出价，特殊处理跳/重拍
      if (d.msg) {
        appendResult(d.msg);
      } else {
        appendResult("双方已出价");
      }
      break;

    case "auction_result": {
      hideAuction();
      const winnerDisplay = d.winner === humanName ? "你" : "对方";
      const cls = d.winner === humanName ? "win-human" : "win-ai";
      appendResult(`<div class="bid-result ${cls}">${winnerDisplay} 以 ${d.amount} 币拍下 ${d.char_name}</div>`);
      updateHumanStatus(d.chips_a, d.owned_a, d.pool_a, d.reward_pool_a);
      // AI 的游戏币/奖励池不显示
      updateAIStatus(d.owned_b);
      break;
    }

    case "auto_fill":
      hideAuction();  // 拍卖结束，隐藏角斗士卡片
      const msg = d.msg.replace(/人类玩家/g, "你").replace(/智能体/g, "对方");
      appendResult(`<div class="auto-fill-msg">🔄 ${msg}</div>`);
      updateHumanStatus(d.chips_a, d.owned_a, d.pool_a, d.reward_pool_a);
      break;

    case "squad_update":
      hideAuction();  // 以防 auto_fill 未触发
      updateHumanStatus(d.chips_a, d.owned_a, d.pool_a, d.reward_pool_a);
      updateAIStatus(d.owned_b);
      break;

    case "deployment":
      if (d.player === humanName) {
        appendChatHuman("📋", `部署第${d.slots}局: ${d.char_id}`);
      } else {
        appendChatAI("📋", `部署第${d.slots}局: ${d.char_id}`);
      }
      break;

    case "match_start":
      setPhase("比赛中");
      setDay(d.day);
      hideInputArea();
      // d.char_a = human, d.char_b = AI
      showMatch(d.char_a, d.char_b, d.slot);
      break;

    case "match_result":
      if (d.tie) {
        showMatchResult("平局", d.loser_char, 0, 1, d.slot);
        updateHumanStatus(undefined, undefined, d.pool_a, d.reward_pool_a);
        appendResult('⚖ 第' + d.slot + '局: ' + d.winner_char + ' vs ' + d.loser_char + ' → 平局（超时），各自point归池');
      } else {
        showMatchResult(d.winner, d.loser_char, d.point_transfer, d.multiplier, d.slot);
        updateHumanStatus(undefined, undefined, d.pool_a, d.reward_pool_a);
        const wd = d.winner === humanName ? "你" : "对方";
        appendResult('⚔ 第' + d.slot + '局: ' + d.winner_char + ' vs ' + d.loser_char + ' → ' + wd + ' 胜！转移 ' + d.point_transfer + ' point' + (d.multiplier !== 1 ? ' ×' + d.multiplier : ''));
      }
      break;

    case "agent_message": {
      if (d.player === humanName) {
        appendChatHuman("💬", truncate(d.content, 1200));
      } else if (d.role === "info" || d.role === "system") {
        // AI 的公开信息（阵容、状态等）显示出来
        appendChatAI("📋", truncate(d.content, 1200));
      }
      // AI 的策略思考不显示
      break;
    }

    case "daily_winner":
      setPhase("每日胜者奖励");
      if (d.winner) {
        const wd = d.winner === humanName ? "你" : "对方";
        appendResult(`🏆 ${wd} 为本日胜者！兑 ${d.reward} 游戏币`);
      } else {
        appendResult("⚖ 今日胜场打平，无胜者奖励");
      }
      updateHumanStatus(d.chips_a, undefined, d.pool_a, d.reward_pool_a);
      updateAIStatus(d.owned_b);
      break;

    case "daily_summary":
      setPhase("全天复盘");
      // 人类不需要生成复盘（通过 awaiting_summary 表单填写）
      break;

    case "evaluation":
      // AI 评估结果不显示给人类
      break;

    case "final_result":
      setPhase("最终结算");
      setDay("");
      hideMatch();
      hideInputArea();
      const won = d.winner === humanName;
      document.getElementById("center-title").textContent = won ? "🏆 你赢了！" : "😔 AI 获胜";
      const finalImg = document.getElementById("auction-img");
      finalImg.src = won ? "/players/斑目貘.png" : "/avatars/ninja.png";
      finalImg.style.borderRadius = "50%";
      finalImg.style.width = "120px";
      finalImg.style.height = "120px";
      finalImg.onerror = function() { this.style.display = "none"; };
      document.getElementById("auction-name").textContent = d.winner === humanName ? "你" : "对方";
      document.getElementById("auction-id").textContent = "";
      document.getElementById("auction-card").style.display = "block";
      appendResult(`<h3>${won ? '🏆 你最终胜出！' : '😔 对方最终胜出'}</h3>`);
      if (d.reason === "bankruptcy") {
        appendResult(`<span style="color:#ff6b6b">💸 ${d.msg}</span>`);
      }
      appendResult(`你: ${d.chips_a} 币 | 对方: ${d.chips_b !== undefined ? d.chips_b + ' 币' : '???'}`);
      break;

    case "error":
      appendResult(`<span style="color:red">❌ ${d.msg}</span>`);
      break;

    // ── 新增：等待人类输入 ──
    case "awaiting_bid":
      console.log("[play] 收到 awaiting_bid:", d.char_name, "chips:", d.chips);
      setPhase("等待你出价");
      hideAIStatus();
      showBidForm(d);
      break;

    case "awaiting_deploy":
      setPhase("等待你部署");
      hideAIStatus();
      showDeployForm(d);
      break;

    case "awaiting_confirm":
      setPhase(d.label || "请确认继续");
      hideAIStatus();
      if (d.label && d.label.includes("开局信息")) {
        saveHumanTabs(d);  // 1. 保存开局信息到人类面板
      }
      showConfirmForm(d);
      break;

    case "awaiting_summary":
      setPhase("填写每日复盘");
      hideAIStatus();
      showSummaryForm(d);
      break;
  }
}

// ═══════════════════════════════════════════════════════════
// 输入表单
// ═══════════════════════════════════════════════════════════

let _bidFormGen = 0;  // 出价表单代数，防止跨轮竞态

function showBidForm(d) {
  console.log("[play] showBidForm 渲染:", d.char_name, "area display:", document.getElementById("input-area").style.display);
  _bidFormGen++;
  const area = document.getElementById("input-area");
  area.style.display = "block";
  area.dataset.bidGen = _bidFormGen;  // 标记当前代数
  const retryHint = d.retry_hint ? `<p class="hint" style="color:#f59e0b;font-weight:700">⚠ ${d.retry_hint}</p>` : "";
  area.innerHTML = `
    <h4>暗标出价</h4>
    <p class="hint">当前角斗士: <b>${d.char_name}</b> (${d.char_id})</p>
    <p class="hint">你的游戏币: <b style="color:var(--cl-human)">${d.chips}</b> | 已拥有: ${d.owned}/3 名角斗士</p>
    <p class="hint">出价范围: 0（弃权）或 50~150。输方出价转入蓄奖池。</p>
    ${retryHint}
    <input type="number" id="bid-input" min="0" max="150" placeholder="输入出价 (0 或 50~150)" autofocus />
    <button onclick="submitBid()">确认出价</button>
    <p id="bid-error" style="color:#f87171;font-size:12px;display:none;margin-top:4px"></p>
  `;
}

async function submitBid() {
  const val = parseInt(document.getElementById("bid-input").value);
  if (isNaN(val) || (val !== 0 && (val < 50 || val > 150))) {
    document.getElementById("bid-error").textContent = "出价必须为 0（弃权）或 50~150 之间";
    document.getElementById("bid-error").style.display = "block";
    return;
  }
  // 3. 游戏币不足时只能弃权
  if (val > 0 && _humanStatusCache.chips < 50) {
    document.getElementById("bid-error").textContent = "你的游戏币不足 50，只能弃权（出价 0）";
    document.getElementById("bid-error").style.display = "block";
    return;
  }
  if (val > _humanStatusCache.chips) {
    document.getElementById("bid-error").textContent = "你的游戏币不足 " + val + "，当前只有 " + _humanStatusCache.chips;
    document.getElementById("bid-error").style.display = "block";
    return;
  }
  const gen = _bidFormGen;  // 捕获当前代数
  const formData = new FormData();
  formData.append("bid", val);
  const resp = await fetch("/api/bid", { method: "POST", body: formData });
  const json = await resp.json();
  if (json.status !== "ok") {
    document.getElementById("bid-error").textContent = json.msg;
    document.getElementById("bid-error").style.display = "block";
  } else if (_bidFormGen === gen) {
    // 仅当 fetch 期间未被新轮次表单替换时才隐藏
    hideInputArea();
    setPhase("已出价，等待 AI...");
  }
}

function showDeployForm(d) {
  const slots = d.slots || [1];
  const squad = d.squad || [];
  const slotLabels = {1: "第 1 局 (无加成)", 2: "第 2 局 (x1.5 夺取)", 3: "第 3 局 (无加成)"};
  // 过滤已出战的角斗士（部署2/3局时排除第1局已出战的）
  const deployedInMatch1 = d.deployed_already || [];

  let slotHtml = "";
  for (const slot of slots) {
    slotHtml += '<div class="deploy-slot-label">' + (slotLabels[slot] || ('第 ' + slot + ' 局')) + '</div>';
    slotHtml += '<select id="deploy-slot-' + slot + '">';
    slotHtml += '<option value="">-- 选择角斗士 --</option>';
    for (const g of squad) {
      const used = deployedInMatch1.includes(g.char_id);
      const usedLabel = used ? " [已出战]" : "";
      const disabled = used ? " disabled" : "";
      const fatigueLabel = g.fatigue < 1 ? (' [疲劳 ' + (g.fatigue*100).toFixed(0) + '%]') : "";
      slotHtml += '<option value="' + g.char_id + '"' + disabled + '>' + g.name + ' (' + g.char_id + ') point:' + g.point + fatigueLabel + usedLabel + '</option>';
    }
    slotHtml += '</select>';
  }

  const area = document.getElementById("input-area");
  area.style.display = "block";
  _bidFormGen++;  // 共用代数计数器，防止跨阶段竞态
  const gen = _bidFormGen;
  const errorMsg = d.error ? '<p style="color:#f87171;font-weight:700;margin-bottom:8px">' + d.error + '</p>' : "";
  area.innerHTML = `
    <h4>部署角斗士</h4>
    <p class="hint">为第 ${slots.join("、")} 局选择出战的角斗士</p>
    ${errorMsg}
    ${slotHtml}
    <button onclick="submitDeploy(${JSON.stringify(slots).replace(/"/g, '&quot;')}, ${gen})">确认部署</button>
    <p id="deploy-error" style="color:#f87171;font-size:12px;display:none;margin-top:4px"></p>
  `;
}

async function submitDeploy(slots, gen) {
  const deployments = {};
  for (const slot of slots) {
    const sel = document.getElementById("deploy-slot-" + slot);
    if (!sel || !sel.value) {
      document.getElementById("deploy-error").textContent = `请为第 ${slot} 局选择角斗士`;
      document.getElementById("deploy-error").style.display = "block";
      return;
    }
    deployments[slot] = sel.value;
  }
  // 检查同一角斗士不能出战两次
  const vals = Object.values(deployments);
  if (new Set(vals).size !== vals.length) {
    document.getElementById("deploy-error").textContent = "同一角斗士不能在同一天出战两次";
    document.getElementById("deploy-error").style.display = "block";
    return;
  }
  const formData = new FormData();
  formData.append("deployments", JSON.stringify(deployments));
  const resp = await fetch("/api/deploy", { method: "POST", body: formData });
  const json = await resp.json();
  if (json.status !== "ok") {
    document.getElementById("deploy-error").textContent = json.msg;
    document.getElementById("deploy-error").style.display = "block";
  } else if (_bidFormGen === gen) {
    // 仅当 fetch 期间未被新表单替换时才隐藏
    hideInputArea();
    setPhase("已部署，等待比赛...");
  }
}

function showConfirmForm(d) {
  const area = document.getElementById("input-area");
  area.style.display = "block";
  _bidFormGen++;  // 代数保护
  const msg = d.msg || d.label || "请确认继续";
  const detail = d.detail ? `<div class="hint" style="white-space:pre-wrap;max-height:280px;overflow-y:auto;margin-bottom:8px;padding:8px;background:#1e293b60;border-radius:4px;border:1px solid #47556940;font-size:12px">${d.detail}</div>` : "";
  area.innerHTML = `
    <h4>${msg}</h4>
    ${detail}
    <button onclick="submitConfirm()">继续</button>
  `;
}

async function submitConfirm() {
  const gen = _bidFormGen;
  const resp = await fetch("/api/confirm", { method: "POST" });
  const json = await resp.json();
  if (json.status === "ok" && _bidFormGen === gen) {
    hideInputArea();
    setPhase("已确认");
  }
}

function showSummaryForm(d) {
  const area = document.getElementById("input-area");
  area.style.display = "block";
  area.innerHTML = `
    <h4>每日复盘</h4>
    <p class="hint">请填写你对 20 名角斗士的胜率排名推断（匿名排名表）:</p>
    <textarea id="summary-ranking" placeholder="写下你的排名分析和策略回顾...">${d.previous_ranking || ""}</textarea>
    <p class="hint" style="margin-top:8px">估算 AI 对手的剩余游戏币:</p>
    <input type="text" id="summary-chips" placeholder="例如: 约 600~700" value="${d.previous_chips || ""}" />
    <button onclick="submitSummary()">提交复盘</button>
  `;
}

async function submitSummary() {
  const ranking = document.getElementById("summary-ranking").value;
  const chips = document.getElementById("summary-chips").value;
  const formData = new FormData();
  formData.append("ranking_table", ranking);
  formData.append("chip_estimate", chips);
  const resp = await fetch("/api/summary", { method: "POST", body: formData });
  const json = await resp.json();
  if (json.status === "ok") {
    hideInputArea();
    setPhase("复盘已提交");
  }
}

function hideInputArea() {
  document.getElementById("input-area").style.display = "none";
  document.getElementById("input-area").innerHTML = "";
}

// ═══════════════════════════════════════════════════════════
// UI 辅助
// ═══════════════════════════════════════════════════════════

function setPhase(text) {
  document.getElementById("phase-label").textContent = text;
}

function setDay(day) {
  document.getElementById("day-label").textContent = day ? `第${day}天` : "";
}

function clearAll() {
  document.getElementById("chat-human").innerHTML = "";
  document.getElementById("chat-ai").innerHTML = "";
  document.getElementById("cards-human").innerHTML = "";
  document.getElementById("cards-ai").innerHTML = "";
  document.getElementById("count-human").textContent = "0";
  document.getElementById("result-area").innerHTML = "";
  document.getElementById("center-title").textContent = "";
  // 只重置 textarea 的值，不删除 textarea 元素本身
  var ta = document.getElementById("ranking-textarea");
  if (ta) ta.value = "";
  document.getElementById("human-tab-ranking").style.display = "none";
  document.getElementById("human-tab-chars").textContent = "";
  hideAuction(); hideMatch(); hideInputArea();
  _humanPreviewData = [];
  _resultDay = 0;
}

function setCardsHuman(gladiators) {
  // 5. 积累预览卡片，不覆盖之前的
  const el = document.getElementById("cards-human");
  let existing = _humanPreviewData || [];
  // 合并新旧数据（按 char_id 去重，新增的追加）
  const seen = new Set(existing.map(g => g.char_id));
  for (const g of gladiators) {
    if (!seen.has(g.char_id)) {
      existing.push(g);
      seen.add(g.char_id);
    }
  }
  _humanPreviewData = existing;
  document.getElementById("count-human").textContent = existing.length;

  let cardsHTML = "";
  for (const g of existing) {
    const wins = g.wins || "?";
    const total = g.total || "?";
    const draws = g.draws !== undefined ? g.draws : "?";
    const isFirstShow = gladiators.some(ng => ng.char_id === g.char_id);
    const newBadge = isFirstShow ? ' <span style="color:#f59e0b;font-size:10px">NEW</span>' : "";
    cardsHTML += '<div class="info-card">' +
      '<span class="card-left">' +
        '<img class="card-avatar" src="/avatars/' + g.char_id + '.png" onerror="this.style.display=\'none\'" alt="" />' +
        '<span class="card-name">' + g.name + newBadge + '</span>' +
      '</span>' +
      '<span class="rate">' + wins + '胜/' + total + '场 胜率:' + (g.win_rate*100).toFixed(1) + '% 平局:' + draws + '场</span>' +
    '</div>';
  }
  el.innerHTML = cardsHTML;
}

function hideAIStatus() {
  document.getElementById("ai-status").classList.remove("show");
}

function showAuction(name, id) {
  document.getElementById("center-title").textContent = "当前拍品";
  const img = document.getElementById("auction-img");
  img.src = `/avatars/${id}.png`;
  img.style.borderRadius = "12px";
  img.style.width = "160px";
  img.style.height = "160px";
  document.getElementById("auction-name").textContent = name;
  document.getElementById("auction-id").textContent = id;
  document.getElementById("auction-card").style.display = "block";
}

function hideAuction() {
  document.getElementById("auction-card").style.display = "none";
  document.getElementById("auction-img").src = "";
}

function showMatch(a, b, slot) {
  document.getElementById("center-title").textContent = `第${slot}局`;
  document.getElementById("match-img-human").src = `/avatars/${a}.png`;
  document.getElementById("match-img-ai").src = `/avatars/${b}.png`;
  document.getElementById("match-char-human").textContent = a;
  document.getElementById("match-char-ai").textContent = b;

  if (pool !== undefined) _humanStatusCache.pool = pool;

function toggleHumanTab(name) {
  const ranking = document.getElementById("human-tab-ranking");
  const chars = document.getElementById("human-tab-chars");
  if (name === 'ranking') {
    ranking.style.display = ranking.style.display === 'none' ? 'block' : 'none';
    chars.style.display = 'none';
  } else {
    chars.style.display = chars.style.display === 'none' ? 'block' : 'none';
    ranking.style.display = 'none';
  }
}

function saveHumanTabs(data) {
  if (!data || !data.detail) return;
  const detail = data.detail;
  const parts = detail.split(/【/);
  for (const part of parts) {
    if (part.startsWith("匿名胜率排名】") || part.startsWith("匿名胜率排名")) {
      document.getElementById("ranking-textarea").value = part.replace(/匿名胜率排名】/, "").trim();
    }
    if (part.startsWith("全部 20 名角斗士】") || part.startsWith("全部 20 名角斗士")) {
      document.getElementById("human-tab-chars").textContent = part.replace(/全部 20 名角斗士】/, "").trim();
    }
  }
  // 自动展开匿名排名 tab，方便查看
  document.getElementById("human-tab-ranking").style.display = "block";
}

function toggleRules() {
  const el = document.getElementById("rules-collapse");
  el.classList.toggle("show");
  if (el.classList.contains("show") && !el.innerHTML) {
    el.innerHTML = RULES_REFERENCE_HTML;
  }

      <p>角斗士的 Point = 你在拍卖中付出的成交价（系统补齐的角斗士 point = 85）。<b>每局比赛结束后，双方角斗士的 point 都会转入各自的蓄奖池</b>，然后在下一局重新分配。</p>
      <h3>比赛怎么结算？</h3>
      <ul>
        <li>角斗士自动 1v1 对战，胜方夺取 <b>min(己方 point, 败方 point)</b></li>
      </ul>
      <p><b>例 1：高 point 角斗士获胜</b></p>
      <p>你的角斗士 point=<b>80</b>，对手 point=<b>60</b>，你赢了 → 你夺走 <b>60</b> point。比赛结束后，你的 80 point 和对手被夺走的 60 point 全部转入你的蓄奖池，对手剩余的 0 point 归零。</p>
      <p><b>例 2：高 point 角斗士输给低 point 角斗士</b></p>
      <p>你的角斗士 point=<b>80</b>，对手 point=<b>60</b>，你输了 → 对手夺走 min(80,60)=<b>60</b> point。比赛结束后，你的 80 point 被夺走 60（剩余 20 转入你的蓄奖池），对手的 60 + 夺来的 60 = 120 point 全部转入对手的蓄奖池。</p>
      <div class="tip">💡 无论输赢，你的 point 最终都会进入<b>蓄奖池</b>——赢了拿更多，输了拿剩余的。</div>
      <h3>⚡ 第 2 局 ×1.5 倍率</h3>
      <p>每天第 2 局的 point 转移量 <b class="highlight">乘以 1.5</b>。这是单局收益最高的一场！</p>
      <p><b>例 1（你赢）</b>：如上，你 point=80 赢对手 point=60 → 夺取 60 × 1.5 = <b>90 point</b>。</p>
      <p><b>例 2（你输）</b>：你 point=80 输给对手 point=60 → 对手夺取 60 × 1.5 = <b>90 point</b>。同样被放大！</p>
      <div class="tip">🧠 第 2 局 ×1.5 是一把双刃剑——赢了大赚，输了也大亏。以及蓄奖池可以为负数。</div>
      <h3>疲劳机制</h3>
      <ul>
        <li>角斗士<b>连续三天出战</b>，HP 逐日恶化：<b>1.0 → 0.8 → 0.6</b></li>
        <li>中间休息一天再出战，HP 会<b>恢复一级</b>：例如第一天出战后 HP=0.8，第二天休息，第三天出战 → HP 恢复到 <b>0.9</b></li>
        <li>同一天<b>不能重复使用</b>同一名角斗士</li>
      </ul>
      <div class="tip">🔄 <b>每天结束后</b>：双方的角斗士会被释放。第二天系统会重新从 20 名角斗士中<b>随机抽取 9 名</b>进入新的拍卖池——所以每天的阵容都是全新的，昨天的优势不会带到今天。</div>
    `
  },
  { // Step 5: 奖励与结算
    title: "每日奖励与最终结算 —— 如何笑到最后",
    body: `
      <p>坚持了三天，来看看最终的胜负如何决出。</p>
      <h3>每日胜者奖励</h3>
      <p>每天 3 局结束后，胜场多的一方为<b>当日胜者</b>，可将蓄奖池兑换为游戏币：</p>
      <ul>
        <li>蓄奖池 ≤ 0 → <b>不兑换</b></li>
        <li>蓄奖池 &lt; 50 → <b>全部兑换</b>为游戏币</li>
        <li>蓄奖池 ≥ 50 → 只兑换 <b>50</b> 游戏币（封顶）</li>
      </ul>
      <p>平局则双方都不兑换。蓄奖池中剩余的 point 留到第二天。</p>
      <h3>最终结算（3 天后）</h3>
      <p>3 天结束后，蓄奖池中的 point <b>1:1 兑换为游戏币</b>，加上剩余游戏币 = 总财富。总财富更多的一方<b>最终获胜</b>。</p>
      <div class="tip">🎯 <b>策略忠告</b><br>
      • 如果以赢钱为目的，建议准备上纸和笔<br>
      • 目前游戏的每个环节均不限时间，可充分思考后再做决定<br>
      • 观察对手的出价模式，建立对手模型<br>
      • 估计对手的出价范围，游戏币范围，知道哪些角斗士情报，都非常重要</div>
    `
  }
];

let tutorialStep = 0;

function renderTutorialStep(n) {
  const step = TUTORIAL_STEPS[n];
  const isLast = (n === 5);
  const content = document.getElementById("tutorial-content");
  content.innerHTML = `
    <h2>${step.title}</h2>
    <div class="subtitle">第 ${n+1} 步 / 共 6 步</div>
    ${step.body}
  `;
  content.scrollTop = 0;

  // 更新进度点
  for (let i = 0; i < 6; i++) {
    const dot = document.getElementById("dot-" + i);
    const line = i < 5 ? document.getElementById("line-" + i) : null;
    dot.className = "step-dot";
    if (i < n) { dot.classList.add("done"); if (line) line.classList.add("done"); }
    else if (i === n) { dot.classList.add("active"); }
    if (line) line.className = "step-line" + (i < n ? " done" : "");
  }

  // 按钮状态
  document.getElementById("btn-prev").classList.toggle("hidden", n === 0);
  document.getElementById("btn-next").textContent = isLast ? "我已理解，开始游戏！" : "继续 →";
  document.getElementById("btn-next").style.background = isLast ? "#22c55e" : "var(--cl-green)";
}

function nextTutorialStep() {
  if (tutorialStep >= 5) {
    startGame();
    return;
  }
  tutorialStep++;
  renderTutorialStep(tutorialStep);
}

function prevTutorialStep() {
  if (tutorialStep > 0) {
    tutorialStep--;
    renderTutorialStep(tutorialStep);
  }
}

function skipTutorial() {
  if (confirm("确定要跳过教程，直接开始游戏吗？\n\n建议第一次玩的玩家完成教程，了解拍卖暗标的核心机制。")) {
    startGame();
  }
}

function truncate(text, len) {
  return text && text.length > len ? text.slice(0, len) + "..." : text;
}

async function resetGame(toHome) {
  if (!confirm("确定要终止当前游戏并重新开始吗？")) return;
  await fetch("/reset", { method: "POST" });
  if (toHome) location.href = "/";
  else location.reload();
}

// ═══════════════════════════════════════════════════════════
// 开始游戏
// ═══════════════════════════════════════════════════════════

// 页面加载时渲染教程第一步
renderTutorialStep(0);

async function startGame() {
  // 隐藏教程遮罩，显示布局引导
  document.getElementById("rules-overlay").style.display = "none";
  document.getElementById("orient-overlay").classList.add("show");
}

async function dismissOrientation() {
  // 隐藏布局引导，正式启动游戏
  document.getElementById("orient-overlay").classList.remove("show");
  document.getElementById("btn-start").disabled = true;
  gameStarted = true;
  clearAll();
  setPhase("启动中...");
  updateHumanStatus(800, 0, 0, 0);
  updateAIStatus(0);
  try {
    const resp = await fetch("/start?mode=play", { method: "POST" });
    const json = await resp.json();
    console.log("/start response:", json);
    if (json.status !== "ok") {
      setPhase("错误: " + json.msg);
      document.getElementById("btn-start").disabled = false;
      document.getElementById("rules-overlay").style.display = "flex";
    } else {
      setPhase("游戏已启动，等待...");
    }
  } catch(e) {
    console.error("POST /start failed:", e);
    setPhase("连接失败: " + e.message);
    document.getElementById("btn-start").disabled = false;
    document.getElementById("rules-overlay").style.display = "flex";
  }
}
</script>
