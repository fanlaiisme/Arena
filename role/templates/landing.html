<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arena 竞技场</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
  }
  .container {
    text-align: center;
    max-width: 600px;
    padding: 2rem;
  }
  h1 {
    font-size: 3rem;
    margin-bottom: 0.5rem;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    color: #94a3b8;
    margin-bottom: 3rem;
    font-size: 1.1rem;
  }
  .cards {
    display: flex;
    gap: 1.5rem;
    justify-content: center;
  }
  .card {
    flex: 1;
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 2rem 1.5rem;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .card:hover {
    border-color: #60a5fa;
    transform: translateY(-2px);
    box-shadow: 0 4px 24px rgba(96, 165, 250, 0.15);
  }
  .card-icon {
    font-size: 2.5rem;
    margin-bottom: 1rem;
  }
  .card h2 {
    font-size: 1.3rem;
    margin-bottom: 0.5rem;
  }
  .card p {
    color: #94a3b8;
    font-size: 0.9rem;
    line-height: 1.5;
  }
  .card.spectate:hover {
    border-color: #a78bfa;
    box-shadow: 0 4px 24px rgba(167, 139, 250, 0.15);
  }
  @media (max-width: 500px) {
    .cards { flex-direction: column; }
    h1 { font-size: 2rem; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>Arena 竞技场</h1>
  <p class="subtitle">LLM Agent 博弈实验平台</p>
  <div class="cards">
    <a href="/dashboard" class="card spectate">
      <div class="card-icon">👁</div>
      <h2>观战模式</h2>
      <p>观看两个 AI 智能体进行经济博弈对决<br>实时拍卖、部署、比赛全流程可视化</p>
    </a>
    <a href="/play" class="card">
      <div class="card-icon">⚔</div>
      <h2>人机对战</h2>
      <p>与 AI 智能体进行经济博弈对决<br>拍卖暗标、阵容部署、策略对抗</p>
    </a>
  </div>
</div>
</body>
</html>
